<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Claude Opus 4.8 — Dot Celebration</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(1200px 600px at 50% -10%, #2a1a4a 0%, #120c24 45%, #0a0716 100%);
            color: #f4f1ff;
        }
        .party {
            width: min(960px, 94vw);
            padding: 28px;
        }
        header { text-align: center; margin-bottom: 18px; }
        h1 {
            margin: 0;
            font-size: clamp(28px, 5vw, 46px);
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #ffd23d, #ff5edb 45%, #3dc9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tagline {
            margin: 6px 0 0;
            color: #b7aee0;
            font-size: clamp(13px, 2vw, 16px);
        }
        .stage {
            width: 100%;
            height: min(56vh, 460px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            background:
              radial-gradient(800px 400px at 50% 120%, rgba(255,94,219,0.08), transparent),
              rgba(255,255,255,0.015);
            box-shadow: 0 20px 60px rgba(0,0,0,0.45), inset 0 0 60px rgba(120,80,200,0.06);
            overflow: hidden;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        button {
            font-size: 16px;
            font-weight: 700;
            color: #1a1030;
            background: linear-gradient(90deg, #ffd23d, #ff8a3d);
            border: none;
            padding: 12px 24px;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255,138,61,0.35);
            transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255,138,61,0.45);
        }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: default; }
        .status {
            font-size: 13px;
            color: #9b91c9;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/demo-celebration.jsx"></script>
</body>
</html>
